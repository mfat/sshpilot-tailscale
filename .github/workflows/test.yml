name: test

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      # sshpilot.plugins.api has no GTK dependency, so --no-deps skips PyGObject.
      - run: pip install "sshpilot @ git+https://github.com/mfat/sshpilot" --no-deps
      - run: pytest -ra
